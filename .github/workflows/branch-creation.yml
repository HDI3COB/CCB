name: Create Branch on New CCB Issue

on:
  issues:
    # Opened catches the initial creation; labeled is the backup for race conditions.
    types: [opened, labeled]

jobs:
  create_branch:
    # Filter for the correct label immediately
    if: contains(github.event.issue.labels.*.name, 'ccb-pending')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Buffer for Label Sync
        # Adding the 1-second delay you requested to allow metadata to settle
        run: sleep 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract Feature Name
        id: extract_name
        run: |
          BODY="${{ github.event.issue.body }}"
          
          # Extracts the line following the 'Feature Name/Topic' header
          FEATURE_NAME=$(echo "$BODY" | grep -A 1 "Feature Name/Topic" | tail -n 1 | xargs)
          
          # Fallback to issue number if empty
          if [ -z "$FEATURE_NAME" ] || [ "$FEATURE_NAME" == "--" ]; then
            FEATURE_NAME="req-${{ github.event.issue.number }}"
          fi

          # Sanitize for git branch naming
          SAFE_NAME=$(echo "ISSUE_${FEATURE_NAME}" | sed 's/[^a-zA-Z0-9]/_/g')
          echo "branch_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Create and Push Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.extract_name.outputs.branch_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin
          
          # Logic to exit gracefully if the branch was already created by the 'opened' trigger
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists. Skipping."
            exit 0
          fi
          
          git checkout -b "$BRANCH_NAME"
          
          # Save issue body as a file in the new branch
          echo "${{ github.event.issue.body }}" > "ccb_request_${{ github.event.issue.number }}.md"
          
          git add .
          git commit -m "docs: auto-generate CCB proposal from #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
