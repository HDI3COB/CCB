name: Create Branch on New CCB Issue

on:
  issues:
    types: [opened]

jobs:
  create_branch:
    # Double-check label matches exactly what is in the template
    if: contains(github.event.issue.labels.*.name, 'ccb-pending')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # Check out the branch where this workflow exists

      - name: Extract Feature Name
        id: extract_name
        run: |
          BODY="${{ github.event.issue.body }}"
          
          # Extracts the line after the 'Feature Name/Topic' heading
          # GitHub Issue Forms turn the input label into a ### H3 heading
          FEATURE_NAME=$(echo "$BODY" | sed -n '/### Feature Name\/Topic/{n;p;}' | xargs)
          
          # If name is empty, fallback to issue number to prevent failure
          if [ -z "$FEATURE_NAME" ]; then
            FEATURE_NAME="issue-${{ github.event.issue.number }}"
          fi

          # Sanitize for branch naming (no spaces or special chars)
          SAFE_NAME=$(echo "ISSUE_${FEATURE_NAME}" | sed 's/[^a-zA-Z0-9]/_/g')
          echo "branch_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Create and Push Branch
        env:
          BRANCH_NAME: ${{ steps.extract_name.outputs.branch_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"
          
          # Save the issue content as a file in the new branch
          echo "${{ github.event.issue.body }}" > "ccb_request_${{ github.event.issue.number }}.md"
          
          git add .
          git commit -m "docs: auto-generate CCB proposal from #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
